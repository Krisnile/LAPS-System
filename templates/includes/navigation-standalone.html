{% load static %}
{# 用于账户与设置等独立页：顶栏与主站一致，头像下拉为「返回主页」+「登出」 #}
<nav class="navbar navbar-expand-lg navbar-absolute navbar-transparent">
    <div class="container-fluid">
        <div class="navbar-wrapper">
            <div class="navbar-toggle d-inline">
                <button type="button" class="navbar-toggler">
                    <span class="navbar-toggler-bar bar1"></span>
                    <span class="navbar-toggler-bar bar2"></span>
                    <span class="navbar-toggler-bar bar3"></span>
                </button>
            </div>
            <a class="navbar-brand" href="{% url 'index' %}" data-en="Account & Settings" data-zh="账户与设置">账户与设置</a>
        </div>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navigation"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-bar navbar-kebab"></span>
            <span class="navbar-toggler-bar navbar-kebab"></span>
            <span class="navbar-toggler-bar navbar-kebab"></span>
        </button>
        <div class="collapse navbar-collapse" id="navigation">
            <ul class="navbar-nav ml-auto">
                <li class="input-group d-flex align-items-center mb-0">
                    <label class="switch theme-switch" title="切换主题 / Switch theme">
                        <input type="checkbox" class="bsc" checked="">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="search-bar input-group">
                    <button class="btn btn-link" id="search-button" data-toggle="modal" data-target="#searchModal"><i
                            class="tim-icons icon-zoom-split"></i>
                        <span class="d-lg-none d-md-block" data-en="Search" data-zh="搜索">搜索</span>
                    </button>
                </li>
                <li class="dropdown nav-item">
                    <a href="javascript:void(0)" class="dropdown-toggle nav-link" data-toggle="dropdown">
                        <div class="notification d-none d-lg-block d-xl-block"></div>
                        <i class="tim-icons icon-sound-wave"></i>
                        <p class="d-lg-none" data-en="Notifications" data-zh="通知">通知</p>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-right dropdown-navbar">
                        <li class="nav-link"><a href="#" class="nav-item dropdown-item" data-en="Mike John responded to your email" data-zh="Mike John 已回复你的邮件">Mike John 已回复你的邮件</a></li>
                        <li class="nav-link"><a href="javascript:void(0)" class="nav-item dropdown-item" data-en="You have 5 more tasks" data-zh="你还有 5 个任务">你还有 5 个任务</a></li>
                        <li class="nav-link"><a href="javascript:void(0)" class="nav-item dropdown-item" data-en="Your friend Michael is in town" data-zh="你的朋友 Michael 在城里">你的朋友 Michael 在城里</a></li>
                        <li class="nav-link"><a href="javascript:void(0)" class="nav-item dropdown-item" data-en="Another notification" data-zh="其他通知">其他通知</a></li>
                        <li class="nav-link"><a href="javascript:void(0)" class="nav-item dropdown-item" data-en="Another one" data-zh="再一条">再一条</a></li>
                    </ul>
                </li>
                <li class="dropdown nav-item">
                    <a href="javascript:void(0)" class="dropdown-toggle nav-link" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <div class="photo">
                            <img src="{% static 'assets/img/anime3.png' %}" alt="Profile">
                        </div>
                        <b class="caret d-none d-lg-block d-xl-block"></b>
                        <p class="d-lg-none" data-en="Account" data-zh="账户">账户</p>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-right dropdown-navbar">
                        <li class="nav-link"><a href="{% url 'index' %}" class="nav-item dropdown-item" data-en="Back to Dashboard" data-zh="返回主页">返回主页</a></li>
                        <li class="dropdown-divider"></li>
                        {% if request.user.is_authenticated %}
                        <li class="nav-link"><a href="{% url 'logout' %}" class="nav-item dropdown-item" data-en="Logout" data-zh="登出">登出</a></li>
                        {% endif %}
                    </ul>
                </li>
                <li class="separator d-lg-none"></li>
            </ul>
        </div>
    </div>
</nav>
<div class="modal modal-search fade" id="searchModal" tabindex="-1" role="dialog" aria-labelledby="searchModal"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" class="form-control" id="inlineFormInputGroup" placeholder="SEARCH">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <i class="tim-icons icon-simple-remove"></i>
                </button>
            </div>
        </div>
    </div>
</div>
