<div class="fixed-plugin">
    <div class="dropdown show-dropdown">
        <a href="#" data-toggle="dropdown">
            <i class="fa fa-cog fa-2x"> </i>
        </a>
    <ul class="dropdown-menu" onclick="event.stopPropagation();">
            <li class="header-title" data-en="Sidebar Background" data-zh="侧边栏背景">侧边栏背景</li>
            <li class="adjustments-line">
                <a href="javascript:void(0)" class="switch-trigger background-color">
                    <div class="badge-colors text-center">
                        <span class="badge filter badge-primary active" data-color="primary"></span>
                        <span class="badge filter badge-info" data-color="blue"></span>
                        <span class="badge filter badge-success" data-color="green"></span>
                    </div>
                    <div class="clearfix"></div>
                </a>
            </li>
            <li class="adjustments-line text-center color-change">
                <span class="color-label" data-en="LIGHT MODE" data-zh="浅色模式">浅色模式</span>
                <span class="badge light-badge mr-2"></span>
                <span class="badge dark-badge ml-2"></span>
                <span class="color-label" data-en="DARK MODE" data-zh="深色模式">深色模式</span>
            </li>
            <li class="adjustments-line text-center color-change" onclick="event.stopPropagation();">
                <label for="langSelect" style="display:inline-block; margin-right:6px;" data-en="Language" data-zh="语言">语言</label>
                <select id="langSelect" class="form-control" style="width:120px;height:45px; display:inline-block;">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </li>
            <li class="button-container text-center" onclick="event.stopPropagation();">
                <!-- Replace default download/support/share with a single link to the project repo -->
                <a href="https://github.com/Krisnile/LAPS-System" target="_blank"
                    class="btn btn-primary btn-block btn-round" data-en="Project Repository" data-zh="项目仓库">项目仓库</a>
                <p style="margin-top:8px; font-size:0.9rem; color:inherit;" data-en="Visit on GitHub" data-zh="在 GitHub 上查看">在 GitHub 上查看</p>
            </li>
        </ul>
    </div>
</div>

<!-- Language switching handled by static/assets/js/lang-switcher.js -->
