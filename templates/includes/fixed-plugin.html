<div class="fixed-plugin">
    <div class="dropdown show-dropdown">
        <a href="#" data-toggle="dropdown">
            <i class="fa fa-cog fa-2x"> </i>
        </a>
        <ul class="dropdown-menu" onclick="event.stopPropagation();">
            <li class="header-title" data-en="Interface Settings" data-zh="界面设置">界面设置</li>

            <!-- 主题色（跟随侧边栏主题） -->
            <li class="adjustments-line mt-1">
                <span class="switch-label d-block mb-1" data-en="Theme color" data-zh="主题色">主题色</span>
                <a href="javascript:void(0)" class="switch-trigger background-color">
                    <div class="badge-colors text-left">
                        <span class="badge filter badge-primary active" data-color="primary" title="Primary"></span>
                        <span class="badge filter badge-info" data-color="blue" title="Blue"></span>
                        <span class="badge filter badge-success" data-color="green" title="Green"></span>
                    </div>
                    <div class="clearfix"></div>
                </a>
            </li>

            <!-- 布局（左 / 中 / 宽） -->
            <li class="adjustments-line mt-2">
                <span class="switch-label d-block mb-1" data-en="Layout" data-zh="布局">布局</span>
                <div class="d-flex justify-content-between px-1">
                    <button type="button" class="btn btn-sm btn-outline-default layout-item active" data-layout="left"
                            data-en="Left" data-zh="左侧">左侧</button>
                    <button type="button" class="btn btn-sm btn-outline-default layout-item" data-layout="center"
                            data-en="Center" data-zh="居中">居中</button>
                    <button type="button" class="btn btn-sm btn-outline-default layout-item" data-layout="wide"
                            data-en="Wide" data-zh="宽屏">宽屏</button>
                </div>
            </li>

            <!-- 深浅模式 -->
            <li class="adjustments-line text-center color-change mt-2">
                <span class="color-label" data-en="LIGHT MODE" data-zh="浅色模式">浅色模式</span>
                <span class="badge light-badge mr-2"></span>
                <span class="badge dark-badge ml-2"></span>
                <span class="color-label" data-en="DARK MODE" data-zh="深色模式">深色模式</span>
            </li>

            <!-- 语言切换 -->
            <li class="adjustments-line text-center color-change mt-1" onclick="event.stopPropagation();">
                <label for="langSelect" style="display:inline-block; margin-right:6px;"
                       data-en="Language" data-zh="语言">语言</label>
                <select id="langSelect" class="form-control" style="width:120px;height:45px; display:inline-block;">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </li>

            <!-- 项目链接 -->
            <li class="button-container text-center" onclick="event.stopPropagation();">
                <a href="https://github.com/Krisnile/LAPS-System" target="_blank"
                   class="btn btn-primary btn-block btn-round"
                   data-en="Project Repository" data-zh="项目仓库">项目仓库</a>
                <p style="margin-top:8px; font-size:0.9rem; color:inherit;"
                   data-en="Visit on GitHub" data-zh="在 GitHub 上查看">在 GitHub 上查看</p>
            </li>
        </ul>
    </div>
</div>

<!-- Language switching handled by static/assets/js/lang-switcher.js -->
