{% extends 'layouts/base_auth.html' %}
{% load i18n static %}

{% block title %}注册{% endblock title %}

{% block auth_card %}
<div id="root-signup"></div>
{% endblock auth_card %}

{% block extrajs %}
{{ block.super }}
<script>
  (function() {
    var tokenInput = document.querySelector('input[name=csrfmiddlewaretoken]');
    if (tokenInput && tokenInput.value) {
      window.__CSRFTOKEN__ = tokenInput.value;
    }
  })();
</script>
{% endblock extrajs %}
