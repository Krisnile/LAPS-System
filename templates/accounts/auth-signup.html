{% extends 'layouts/base_auth.html' %}
{% load i18n static %}

{% block title %}注册{% endblock title %}

{% block auth_card %}
<div id="root-signup">
{% include 'includes/react_root_shell.html' %}
</div>
{% endblock auth_card %}

{% block extrahead %}
{{ block.super }}
<script>
  // 将 Django 生成的 CSRF token 暴露给前端 React（注册页，需在 bundle 之前）
  window.__CSRFTOKEN__ = '{{ csrf_token }}';
</script>
{% endblock extrahead %}
