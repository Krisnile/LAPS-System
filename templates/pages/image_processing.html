{% extends 'layouts/base.html' %}
{% load static %}

{% block title %} Image Annotation {% endblock title %}

{% block content %}
<div class="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
<style>
/* ===== Label Studio 风格 ===== */
.ps-container {
    height: 800px;
    display: flex;
    flex-direction: column;
    background: #343a40;
    color: #fff;
    font-size: 14px;
    border-radius: 5px;
    overflow: hidden;
}

/* 顶部菜单 */
.ps-topbar {
    height: 36px;
    background: #212529;
    display: flex;
    align-items: center;
    padding: 0 15px;
}
.ps-topbar span {
    margin-right: 20px;
    cursor: pointer;
    color: #adb5bd;
}
.ps-topbar span:hover {
    color: #fff;
}
.ps-topbar input[type=file] {
    display: none;
}

/* 主区域 */
.ps-main {
    flex: 1;
    display: flex;
}

/* 左侧工具栏 */
.ps-toolbar {
    width: 48px;
    background: #495057;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
}
.ps-toolbar button {
    width: 32px;
    height: 32px;
    margin-bottom: 10px;
    background: #6c757d;
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 3px;
}
.ps-toolbar button:hover {
    background: #5a6268;
}

/* 画布区 */
.ps-canvas-area {
    flex: 1;
    background: #495057;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}
#image-canvas {
    background: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* 右侧面板 */
.ps-panels {
    width: 300px;
    background: #495057;
    padding: 10px;
    display: flex;
    flex-direction: column;
}
.panel {
    background: #6c757d;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 3px;
}
.panel h6 {
    color: #fff;
    margin-bottom: 10px;
}
#annotation-list {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 150px;
    overflow-y: auto;
}
#annotation-list li {
    padding: 3px 5px;
    background: #495057;
    margin-bottom: 3px;
    border-radius: 3px;
}

/* 状态栏 */
.ps-statusbar {
    height: 26px;
    background: #212529;
    padding-left: 10px;
    display: flex;
    align-items: center;
    color: #adb5bd;
    justify-content: space-between;
}
</style>

<div class="ps-container">

    <!-- 顶部菜单 -->
    <div class="ps-topbar">
        <span onclick="document.getElementById('image').click()">上传文件</span>
        <span>任务类型</span>
        <input type="file" id="image" accept="image/*" onchange="loadImage(event)">
    </div>

    <div class="ps-main">

        <!-- 左侧工具栏 -->
        <div class="ps-toolbar">
            <button onclick="setTool('select')" title="选择">⬚</button>
            <button onclick="setTool('rectangle')" title="矩形标注">▭</button>
            <button onclick="setTool('polygon')" title="多边形标注">🔷</button>
            <button onclick="undo()" title="撤销">↶</button>
            <button onclick="redo()" title="重做">↷</button>
        </div>

        <!-- 中央画布 -->
        <div class="ps-canvas-area">
            <canvas id="image-canvas" width="800" height="600"></canvas>
        </div>

        <!-- 右侧面板 -->
        <div class="ps-panels">
            <div class="panel">
                <h6>标签类别</h6>
                <select id="label-select" class="form-control mb-2">
                    <option value="cat">猫</option>
                    <option value="dog">狗</option>
                    <option value="car">汽车</option>
                </select>
                <button class="btn btn-sm btn-info w-100" onclick="addLabel()">设置类别</button>
            </div>

            <div class="panel">
                <h6>标注列表</h6>
                <ul id="annotation-list"></ul>
            </div>

            <div class="panel">
                <h6>导出</h6>
                <button class="btn btn-sm btn-success w-100" onclick="exportAnnotations()">导出 JSON</button>
            </div>
        </div>

    </div>

    <!-- 状态栏 -->
    <div class="ps-statusbar">
        <span id="tool-name">选择</span>
        <span id="mouse-coords">X:0 Y:0</span>
    </div>

</div>
                </div>
            </div>
    </div>
</div>
{% endblock content %}

{% block extrajs %}
<script>
let canvas = document.getElementById('image-canvas');
let ctx = canvas.getContext('2d');
let originalImage = new Image();
let currentTool = 'select';
let currentLabel = 'cat';
let annotations = [];
let currentPolygon = [];
let undoStack = [];
let redoStack = [];

/* ===== 工具切换 ===== */
function setTool(tool) {
    currentTool = tool;
    document.getElementById('tool-name').innerText = tool;
}

/* ===== 载入图片 ===== */
function loadImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (evt) {
        originalImage.onload = function () {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
            document.getElementById('tool-name').innerText = '图像已加载';
        };
        originalImage.src = evt.target.result;
    };
    reader.readAsDataURL(file);
}

/* ===== 设置标签类别 ===== */
function addLabel() {
    currentLabel = document.getElementById('label-select').value;
    alert("当前标注类别: " + currentLabel);
}

/* ===== 绘制标注 ===== */
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', drawMouseMove);
canvas.addEventListener('mouseup', finishDraw);

function startDraw(e){
    if(currentTool === 'rectangle' || currentTool === 'polygon'){
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        if(currentTool === 'rectangle'){
            currentPolygon = [{x,y}];
        } else if(currentTool === 'polygon'){
            currentPolygon.push({x,y});
        }
        updateCanvas();
    }
}

function drawMouseMove(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    document.getElementById('mouse-coords').innerText = `X:${Math.round(x)} Y:${Math.round(y)}`;
}

function finishDraw(e){
    if(currentTool === 'rectangle' && currentPolygon.length===1){
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        currentPolygon.push({x,y});
        annotations.push({type:'rectangle', coords:currentPolygon, label:currentLabel});
        updateAnnotationList();
        undoStack.push(JSON.stringify(annotations));
        currentPolygon = [];
        updateCanvas();
    }
}

/* ===== 绘制多边形 ===== */
function updateCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(originalImage,0,0);
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'red';
    ctx.fillStyle = 'rgba(255,0,0,0.3)';

    annotations.forEach(ann=>{
        if(ann.type==='rectangle'){
            const x0=ann.coords[0].x, y0=ann.coords[0].y;
            const x1=ann.coords[1].x, y1=ann.coords[1].y;
            ctx.strokeRect(x0,y0,x1-x0,y1-y0);
            ctx.fillRect(x0,y0,x1-x0,y1-y0);
        } else if(ann.type==='polygon'){
            ctx.beginPath();
            ann.coords.forEach((pt,i)=>{
                if(i===0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            });
            ctx.closePath();
            ctx.stroke();
            ctx.fill();
        }
    });

    if(currentTool==='polygon' && currentPolygon.length>0){
        ctx.beginPath();
        currentPolygon.forEach((pt,i)=>{
            if(i===0) ctx.moveTo(pt.x,pt.y);
            else ctx.lineTo(pt.x,pt.y);
        });
        ctx.stroke();
    }
}

/* ===== 标注列表更新 ===== */
function updateAnnotationList(){
    const list = document.getElementById('annotation-list');
    list.innerHTML='';
    annotations.forEach((ann,i)=>{
        const li = document.createElement('li');
        li.innerText=`${i+1}: ${ann.label} (${ann.type})`;
        list.appendChild(li);
    });
}

/* ===== 导出 JSON ===== */
function exportAnnotations(){
    const data = JSON.stringify(annotations,null,2);
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'annotations.json';
    a.click();
}

/* ===== 撤销/重做 ===== */
function undo(){
    if(undoStack.length>0){
        redoStack.push(JSON.stringify(annotations));
        const prev = undoStack.pop();
        annotations = JSON.parse(prev);
        updateAnnotationList();
        updateCanvas();
    }
}

function redo(){
    if(redoStack.length>0){
        undoStack.push(JSON.stringify(annotations));
        const next = redoStack.pop();
        annotations = JSON.parse(next);
        updateAnnotationList();
        updateCanvas();
    }
}
</script>
{% endblock extrajs %}
