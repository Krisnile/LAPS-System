{% extends 'layouts/base.html' %}
{% load static %}

{% block title %}Dashboard{% endblock title %}

{% block extrastyle %}{% endblock extrastyle %}

{% block content %}
{# 将原始 Django 模板内容迁移到 React，由下方 data-dashboard 传入数据 #}
<div
  id="root-dashboard"
  data-dashboard='{
    "projectsCount": {{ projects_count|default:0 }},
    "datasetsCount": {{ datasets_count|default:0 }},
    "tasksCount": {{ tasks_count|default:0 }},
    "pendingTasks": {{ pending_tasks|default:0 }},
    "completedTasks": {{ completed_tasks|default:0 }},
    "isAuthenticated": {{ request.user.is_authenticated|yesno:"true,false" }},
    "username": "{{ request.user.get_full_name|default:request.user.username|default_if_none:"" }}",
    "urls": {
      "projects": "{% url 'projects' %}",
      "datasets": "{% url 'datasets' %}",
      "tasks": "{% url 'tasks' %}",
      "annotation": "{% url 'annotation' %}"
    }
  }'
></div>
{% endblock content %}

{% block extrajs %}{% endblock extrajs %}
