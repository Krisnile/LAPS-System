{% extends 'layouts/base.html' %}
{% load static %}

{% block title %}Tasks{% endblock title %}

{% block content %}
<div
  id="root-tasks"
  data-tasks-props='{
    "urls": {
      "tasks": "{% url 'tasks' %}",
      "projects": "{% url 'projects' %}",
      "sample_demo": "{% url 'tasks_sample_demo' %}",
      "annotation": "{% url 'annotation' %}",
      "tasks_api": "{% url 'tasks_json_list' %}",
      "available_images": "{% url 'annotate_available_images' %}",
      "task_create": "{% url 'annotate_task_create' %}",
      "task_detail_tpl": "{% url 'annotate_task_detail' pk=0 %}",
      "tasks_delete_group": "{% url 'tasks_delete_group' %}"
    },
    "projects": [
      {% for p in projects %}
      {
        "id": {{ p.id }},
        "name": "{{ p.name|escapejs }}",
        "annotation_type": "{{ p.annotation_type|escapejs }}",
        "linked_dataset_ids": [
          {% for ds in p.linked_datasets.all %}
          {{ ds.id }}{% if not forloop.last %}, {% endif %}
          {% endfor %}
        ]
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ],
    "datasets": [
      {% for d in datasets %}
      {
        "id": {{ d.id }},
        "name": "{{ d.name|escapejs }}",
        "linked_project_names": "{% for lp in d.projects.all %}{{ lp.name|escapejs }}{% if not forloop.last %}, {% endif %}{% endfor %}"
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ],
    "tasks": [
      {% for t in tasks %}
      {
        "id": {{ t.id }},
        "project_id": {{ t.project_id }},
        "project_name": "{{ t.project.name|escapejs }}",
        "dataset_id": {% if t.image.dataset_id %}{{ t.image.dataset_id }}{% else %}null{% endif %},
        "image_id": {{ t.image_id }},
        "image_name": "{{ t.image.file.name|default:''|escapejs }}",
        "dataset_name": "{{ t.image.dataset.name|default:''|escapejs }}",
        "image_url": "{{ t.image.file.url|escapejs }}",
        "status": "{{ t.status|escapejs }}",
        "created_at": "{{ t.created_at.isoformat }}"
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ]
  }'
>
{% include 'includes/react_root_shell.html' %}
</div>
{% endblock content %}
